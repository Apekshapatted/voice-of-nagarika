<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-white p-5 shadow-lg">
    <h2 class="text-xl font-bold mb-6">AI Smart City</h2>

    <ul class="space-y-4">
      <li onclick="goDashboard()" class="cursor-pointer hover:text-blue-500">
        Dashboard
      </li>

      <li onclick="goToMyComplaints()" class="cursor-pointer hover:text-blue-500">
        My Complaints
      </li>

      <li class="text-blue-500 font-semibold">
        Profile
      </li>
    </ul>
  </div>

  <!-- Main -->
  <div class="flex-1 p-6">

    <h2 class="text-2xl font-bold mb-6">My Profile</h2>

    <div class="bg-white p-6 rounded-xl shadow max-w-lg">

      <!-- Username -->
      <label class="block mb-2 font-semibold">Username</label>
      <input id="username"
             class="w-full border p-2 mb-4 rounded"
             placeholder="Enter username">

      <!-- Phone -->
      <label class="block mb-2 font-semibold">Phone Number</label>
      <input id="phone"
             class="w-full border p-2 mb-4 rounded"
             placeholder="Enter phone number">

      <!-- Address -->
      <label class="block mb-2 font-semibold">Address</label>
      <textarea id="address"
                class="w-full border p-2 mb-4 rounded"
                placeholder="Enter address"></textarea>

      <!-- Update & Save Button -->
      <button id="saveBtn"
              onclick="saveProfile()"
              class="bg-blue-500 text-white w-full py-2 rounded-lg">
        Update & Save
      </button>

      <p id="msg" class="text-green-500 mt-3 font-semibold"></p>

    </div>

  </div>
</div>

<script>

// Load existing citizen details
let citizenData = {
  username: localStorage.getItem("citizenName") || "",
  phone: localStorage.getItem("citizenPhone") || "",
  address: localStorage.getItem("citizenAddress") || ""
};

// Check updated profile data
let userProfile = JSON.parse(localStorage.getItem("userProfile")) || {};

let user = { ...citizenData, ...userProfile };

function loadProfile() {
  document.getElementById("username").value = user.username || "";
  document.getElementById("phone").value = user.phone || "";
  document.getElementById("address").value = user.address || "";
}

function saveProfile() {

  let updatedUser = {
    username: document.getElementById("username").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  localStorage.setItem("userProfile", JSON.stringify(updatedUser));

  document.getElementById("msg").innerText =
      "Profile Updated & Saved Successfully!";

  // Update citizen details source
  localStorage.setItem("citizenName", updatedUser.username);
  localStorage.setItem("citizenPhone", updatedUser.phone);
  localStorage.setItem("citizenAddress", updatedUser.address);
}

function goDashboard() {
  window.location.href = "/citizen";
}

function goToMyComplaints() {
  window.location.href = "/mycomplaints";
}

loadProfile();

</script>

</body>
</html>
