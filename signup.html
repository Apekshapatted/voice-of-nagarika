<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.container{
    width:850px;
    height:500px;
    display:flex;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    background:white;
}

.left{
    width:50%;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h2{
    margin-bottom:30px;
    color:#1e3a8a;
}

input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.link{
    margin-top:15px;
    text-align:center;
}

.right{
    width:50%;
    background:#d6ecff;
    display:flex;
    justify-content:center;
    align-items:center;
}

.right img{
    width:80%;
}
</style>
</head>

<body>

<div class="container">

    <form class="left" method="POST" action="{{ url_for('signup') }}">
        <h2>Sign Up</h2>

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Submit</button>

        <div class="link">
            Already have account?
            <a href="{{ url_for('login') }}">Login</a>
        </div>
    </form>

    <div class="right">
        <img src="{{ url_for('static', filename='images/signuppic.jpeg') }}">
    </div>

</div>

</body>
</html>
