<!DOCTYPE html>
<html>
<head>
  <title>My Complaints</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

  <div class="w-64 bg-white p-5 shadow-lg">
    <h2 class="text-xl font-bold mb-6">AI Smart City</h2>

    <ul class="space-y-4">
      <li onclick="goDashboard()" class="cursor-pointer hover:text-blue-500">Dashboard</li>
      <li class="text-blue-500 font-semibold">My Complaints</li>
      <li onclick="goProfile()" class="cursor-pointer hover:text-blue-500">Profile</li>
    </ul>
  </div>

  <div class="flex-1 p-6">

    <h2 class="text-2xl font-bold mb-6">My Complaints</h2>

    <div class="bg-white rounded-xl shadow p-4 overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="text-gray-500 text-left">
            <th>ID</th>
            <th>Type</th>
            <th>Description</th>
            <th>Location</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Submitted At</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
function loadComplaints() {
  let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
  let table = document.getElementById("tableBody");

  table.innerHTML = "";

  if (complaints.length === 0) {
    table.innerHTML = `
      <tr>
        <td colspan="7" class="text-center py-4 text-gray-500">
          No complaints submitted yet
        </td>
      </tr>
    `;
    return;
  }

  complaints.forEach(c => {
    table.innerHTML += `
      <tr class="border-t">
        <td>${c.id}</td>
        <td>${c.category}</td>
        <td>${c.desc}</td>
        <td>${c.location}</td>
        <td>${c.priority}</td>
        <td>${c.status}</td>
        <td>${c.submittedAt}</td>
      </tr>
    `;
  });
}

function goDashboard() {
  window.location.href = "/citizen";
}

function goProfile() {
  window.location.href = "/profile";
}

window.onload = loadComplaints;
</script>

</body>
</html>
