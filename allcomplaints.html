<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart City Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#E8ECFF;display:flex;justify-content:center;padding:20px}

.wrap{display:flex;width:1200px;height:90vh;background:#EEF2FF;border-radius:20px;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:#fff;display:flex;flex-direction:column}
.brand{padding:20px;font-weight:800}

.profile{display:flex;gap:10px;padding:15px;border-bottom:1px solid #eee}
.avatar{width:35px;height:35px;border-radius:50%;background:#4F6EF7;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold}

.nav{padding:10px}
.nav-item{padding:10px;cursor:pointer;border-radius:8px}
.nav-item:hover{background:#f3f4ff}
.nav-item.active{background:#EEF2FF;color:#4F6EF7;font-weight:bold}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;padding:12px;border-bottom:1px solid #eee}
.main{padding:20px;overflow:auto}

h2{margin-bottom:10px}

/* FORM */
.form{display:flex;gap:10px;margin-bottom:15px}
.form input,.form select{padding:8px;border-radius:8px;border:1px solid #ccc}
.form button{background:#4F6EF7;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}

/* TABLE */
table{width:100%;background:#fff;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
th{background:#f9fafb}

/* BADGES */
.badge{padding:4px 10px;border-radius:20px;font-size:11px}
.b-critical{background:#ffe4e6;color:#dc2626}
.b-high{background:#fff7ed;color:#ea580c}
.b-medium{background:#fef9c3;color:#ca8a04}
.b-low{background:#ecfdf5;color:#059669}

.s-pending{background:#ef4444;color:#fff}
.s-inprogress{background:#3b82f6;color:#fff}
.s-resolved{background:#ecfdf5;color:#059669}

/* PAGINATION */
.pg{display:flex;gap:6px;margin-top:10px}
.pg div{padding:5px 10px;border:1px solid #ccc;cursor:pointer}
.pg .active{background:#4F6EF7;color:#fff}
</style>
</head>

<body>

<div class="wrap">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="brand">AI Smart City</div>

<div class="profile">
  <div class="avatar" id="avatar">GU</div>
  <div>
    <div id="userName" style="font-size:12px;font-weight:700">User</div>
    <div style="font-size:10px;color:#888">Officer</div>
  </div>
</div>

<div class="nav">
  <div class="nav-item">Dashboard</div>
  <div class="nav-item">Pending</div>
  <div class="nav-item">High Priority</div>
  <div class="nav-item active">All Complaints</div>
  <div class="nav-item">Settings</div>
</div>

</div>

<!-- CONTENT -->
<div class="content">

<div class="topbar">Smart City Dashboard</div>

<div class="main">

<h2>All Complaints <span id="count">(0)</span></h2>

<!-- ADD FORM -->
<div class="form">
  <input id="type" placeholder="Complaint Type">
  <input id="desc" placeholder="Description">
  <select id="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Critical</option>
  </select>
  <button onclick="add()">Add</button>
</div>

<!-- FILTER -->
<div class="form">
  <input id="search" placeholder="Search..." oninput="render()">
  <select id="status" onchange="render()">
    <option value="">All</option>
    <option>Pending</option>
    <option>In Progress</option>
    <option>Resolved</option>
  </select>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>ID</th>
<th>Type</th>
<th>Description</th>
<th>Priority</th>
<th>Status</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="pg" class="pg"></div>

</div>
</div>

</div>

<script>
// USER DATA
if(!localStorage.getItem("username")){
  localStorage.setItem("username","Guest User");
}

const name = localStorage.getItem("username");
document.getElementById("userName").innerText = name;

// Avatar initials
document.getElementById("avatar").innerText = name.split(" ").map(n=>n[0]).join("").toUpperCase();

// APP LOGIC
let complaints=[];
let page=1;
const size=5;

function add(){
  const t=type.value;
  const d=desc.value;
  const p=priority.value;

  if(!t||!d){alert("Fill fields");return;}

  complaints.unshift({
    id:"#"+(complaints.length+1),
    type:t,
    desc:d,
    priority:p,
    status:"Pending",
    date:new Date()
  });

  type.value="";
  desc.value="";

  render();
}

function render(){
  let data=[...complaints];

  const s=search.value.toLowerCase();
  const st=status.value;

  if(s){
    data=data.filter(c=>c.type.toLowerCase().includes(s)||c.desc.toLowerCase().includes(s));
  }

  if(st){
    data=data.filter(c=>c.status===st);
  }

  count.innerText=`(${data.length})`;

  const start=(page-1)*size;
  const pag=data.slice(start,start+size);

  table.innerHTML="";

  if(pag.length===0){
    table.innerHTML="<tr><td colspan='5'>No complaints found</td></tr>";
  }

  pag.forEach(c=>{
    table.innerHTML+=`
    <tr>
      <td>${c.id}</td>
      <td>${c.type}</td>
      <td>${c.desc}</td>
      <td><span class="badge b-${c.priority.toLowerCase()}">${c.priority}</span></td>
      <td><span class="badge s-${c.status.replace(" ","").toLowerCase()}">${c.status}</span></td>
    </tr>`;
  });

  renderPg(data.length);
}

function renderPg(total){
  const pages=Math.ceil(total/size);
  pg.innerHTML="";
  for(let i=1;i<=pages;i++){
    pg.innerHTML+=`<div class="${i===page?'active':''}" onclick="go(${i})">${i}</div>`;
  }
}

function go(p){
  page=p;
  render();
}

render();
</script>

</body>
</html>
